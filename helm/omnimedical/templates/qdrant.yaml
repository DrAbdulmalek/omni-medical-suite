{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnimedical.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omnimedical.labels" . | nindent 4 }}
    app: qdrant
spec:
  replicas: {{ .Values.qdrant.replicaCount }}
  selector:
    matchLabels:
      {{- include "omnimedical.selectorLabels" . | nindent 6 }}
      app: qdrant
  template:
    metadata:
      labels:
        {{- include "omnimedical.selectorLabels" . | nindent 8 }}
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: {{ include "omnimedical.fullname" . }}-qdrant-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "omnimedical.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    {{- include "omnimedical.selectorLabels" . | nindent 4 }}
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "omnimedical.fullname" . }}-qdrant-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.qdrant.persistence.size }}
{{- end }}
