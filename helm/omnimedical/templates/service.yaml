apiVersion: v1
kind: Service
metadata:
  name: {{ include "omnimedical.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omnimedical.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: 8000
      name: http
  selector:
    {{- include "omnimedical.selectorLabels" . | nindent 4 }}
    app: api
