# =============================================================================
# OmniFile Kubernetes Namespace
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: omnifile
  labels:
    app.kubernetes.io/name: omnifile
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "OmniFile HTR Processing System"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: omnifile-quota
  namespace: omnifile
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 64Gi
    limits.cpu: "40"
    limits.memory: 128Gi
    persistentvolumeclaims: "10"
    services.loadbalancers: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: omnifile-limits
  namespace: omnifile
spec:
  limits:
    - default:
        cpu: "2"
        memory: 4Gi
      defaultRequest:
        cpu: "100m"
        memory: 256Mi
      max:
        cpu: "8"
        memory: 32Gi
      min:
        cpu: "50m"
        memory: 128Mi
      type: Container
