groups:
  - name: medical_ocr_alerts
    interval: 30s
    rules:
      - alert: HighTaskFailureRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        annotations:
          summary: "ارتفاع نسبة فشل المهام"
          description: "نسبة فشل المهام تجاوزت 5% خلال آخر 5 دقائق."
        labels:
          severity: warning

      - alert: TaskProcessingTooLong
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 30
        for: 2m
        annotations:
          summary: "زمن معالجة المهام مرتفع"
          description: "95% من المهام تستغرق أكثر من 30 ثانية."
        labels:
          severity: warning

      - alert: NoActiveCeleryWorkers
        expr: celery_workers_active == 0
        for: 1m
        annotations:
          summary: "لا يوجد عمال Celery نشطين"
          description: "جميع عمال Celery غير متصلين أو معطلين."
        labels:
          severity: critical

      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 1024
        for: 5m
        annotations:
          summary: "استخدام ذاكرة مرتفع"
          description: "ذاكرة التطبيق تجاوزت 1 جيجابايت."
        labels:
          severity: warning

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        annotations:
          summary: "خدمة غير متاحة"
          description: "الخدمة غير قادرة على الاستجابة."
        labels:
          severity: critical
