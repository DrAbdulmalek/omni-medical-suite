route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'webhook_receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical_webhook'
      continue: true
    - match:
        severity: warning
      receiver: 'webhook_receiver'

receivers:
  - name: 'webhook_receiver'
    webhook_configs:
      - url: 'http://host.docker.internal:5000/alert-webhook'
        send_resolved: true

  - name: 'critical_webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:5000/critical-alert'
        send_resolved: true
