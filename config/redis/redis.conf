# ============================================================================
# OmniMedical Suite — Redis Configuration
# ============================================================================
# إعدادات Redis محسّنة لبيئة المستشفيات والعيادات
# ============================================================================

# الشبكة
bind 0.0.0.0
port 6380
protected-mode yes

# الذاكرة
maxmemory 256mb
maxmemory-policy no-eviction  # لا نحذف بيانات طبية أبداً

# الثبات (Persistence)
save 900 1      # حفظ كل 15 دقيقة إذا كان هناك تغيير واحد
save 300 10     # حفظ كل 5 دقائق إذا كان هناك 10 تغييرات
save 60 10000   # حفظ كل دقيقة إذا كان هناك 10000 تغيير

appendonly yes
appendfsync everysec

# الأمان
# requirepass your_secure_password_here  # فعّل كلمة المرور في الإنتاج

# التسجيل
loglevel notice
logfile ""

# الوقت
timeout 300
tcp-keepalive 60
