apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "5s"
      httpMethod: POST
      manageAlerts: true
      alertmanagerUid: "prometheus"

  - name: Qdrant Metrics
    type: prometheus
    access: proxy
    url: http://qdrant:6333
    editable: false
    jsonData:
      timeInterval: "30s"
