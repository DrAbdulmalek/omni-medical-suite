groups:
  - name: omnimedical_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          description: "Error rate is {{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.instance }}"
          description: "P95 latency is {{ $value }}s"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / (1024 * 1024 * 1024) > 4
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"

      - alert: OCRQueueBacklog
        expr: celery_queue_length{queue="ocr"} > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "OCR processing queue backlog: {{ $value }} tasks"

      - alert: OCRProcessingFailed
        expr: rate(celery_task failures_total{task="process_ocr"}[15m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "OCR task failure rate increasing"
