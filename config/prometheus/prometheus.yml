# ============================================================================
# OmniMedical Suite — Prometheus Configuration
# ============================================================================
# مراقبة شاملة لخدمات البنية التحتية الطبية
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'omni-medical'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files: []

# ============================================================================
# Scrape Configurations
# ============================================================================

scrape_configs:
  # --- Prometheus self-monitoring ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # --- API Worker 1 ---
  - job_name: 'omni-api-1'
    static_configs:
      - targets: ['api1:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # --- API Worker 2 ---
  - job_name: 'omni-api-2'
    static_configs:
      - targets: ['api2:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # --- Redis Exporter (اختياري) ---
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # --- Node Exporter (اختياري) ---
