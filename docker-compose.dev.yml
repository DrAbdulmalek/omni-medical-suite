version: "3.9"

# Development overrides — use: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - ./services/uploads:/app/services/uploads
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - OTEL_ENABLED=false
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    volumes:
      - .:/app
    command: celery -A app.tasks worker --loglevel=debug --concurrency=1

  # Dev-only services
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@omnimedical.local
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped
