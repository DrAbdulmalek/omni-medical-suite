name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Python Lint & Type Check ──────────────────────────────────────────
  python-lint:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r services/api/requirements.txt

      - name: Ruff lint
        run: ruff check packages/ services/api/ tests/

      - name: Ruff format check
        run: ruff format --check packages/ services/api/ tests/

      - name: MyPy type check
        run: mypy services/api/app/ --ignore-missing-imports --no-error-summary || true

  # ─── Python Tests ─────────────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_gemini_modules.py \
            --ignore=tests/test_integration_full.py \
            --ignore=tests/test_e2e.py \
            --cov=packages \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: coverage.xml

  # ─── API Service Tests ────────────────────────────────────────────────
  api-tests:
    name: API Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r services/api/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run API tests
        run: |
          PYTHONPATH=services/api python -m pytest services/api/tests/ -v --tb=short \
            --cov=services/api/app \
            --cov-report=term-missing

  # ─── Web Build & Lint ─────────────────────────────────────────────────
  web-build:
    name: Web Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: TypeScript check
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: apps/web
        run: npm run lint

      - name: Next.js build
        run: npm run build

  # ─── Security Scan ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r services/api/app/ -ll -x tests
          bandit -r packages/security/ -ll
        continue-on-error: false

      - name: Check for leaked secrets
        run: |
          FOUND=0
          for pattern in \
            "AKIA[0-9A-Z]{16}" \
            "-----BEGIN.*PRIVATE KEY-----" \
            "eyJ[A-Za-z0-9_-]*\.eyJ" \
            "password\s*=\s*['\"][^'\"]+['\"]" \
            "secret\s*=\s*['\"][^'\"]{8,}['\"]"; do
            if git grep -l -E "$pattern" -- ':!.env*' ':!*.md' 2>/dev/null; then
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "No secrets found in tracked files."
          else
            echo "WARNING: Potential secrets detected above."
          fi

  # ─── Docker Build Validation ──────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [python-tests, web-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
