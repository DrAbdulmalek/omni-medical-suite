# =============================================================================
# OmniMedical Suite — CI/CD Pipeline
# =============================================================================
# Triggers on push/PR to main. Runs linting, tests, builds, and security audits.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same PR / branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  DATABASE_URL: "file:./dev.db"
  # Turborepo remote cache (optional — set TURBO_TOKEN / TURBO_TEAM in repo secrets)
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ===========================================================================
  # Job 1: Lint — ESLint (web) + Ruff (Python)
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- Node.js / Web lint ----------
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run ESLint (web)
        run: npm run lint -- --filter=nextjs_tailwind_shadcn_ts
        working-directory: apps/web

      # ---------- Python lint ----------
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies (with dev extras)
        run: pip install -e ".[dev]" ruff

      - name: Run Ruff lint
        run: ruff check packages/ services/

      - name: Run Ruff format check
        run: ruff format --check packages/ services/

  # ===========================================================================
  # Job 2: Test Python — pytest with coverage
  # ===========================================================================
  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies (Tesseract OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            tesseract-ocr-ara \
            tesseract-ocr-eng \
            libgl1-mesa-glx \
            libglib2.0-0

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=packages \
            --cov=services \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-html \
            -v --tb=short

      - name: Upload coverage report (XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-xml
          path: coverage.xml
          retention-days: 14

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-html
          path: coverage-html/
          retention-days: 14

  # ===========================================================================
  # Job 3: Build Web — Next.js production build
  # ===========================================================================
  build-web:
    name: Build (Web)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run Next.js build
        run: npm run build --workspace=apps/web
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next/
          retention-days: 7

  # ===========================================================================
  # Job 4: Security Audit — secrets scan, npm audit, pip audit
  # ===========================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      # ---------- TruffleHog — secrets scanning ----------
      - name: TruffleHog OSS (secrets scan)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
          path: .

      # ---------- Node.js audit ----------
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run npm audit (root)
        run: npm audit --omit=dev --audit-level=high || true

      - name: Run npm audit (web workspace)
        run: npm audit --omit=dev --audit-level=high --workspace=apps/web || true

      # ---------- Python audit ----------
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies + pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (requirements.txt)
        run: pip-audit -r requirements.txt || true

      # ---------- Bandit — Python SAST ----------
      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: bandit -r packages/ services/ -ll -ii -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 14
