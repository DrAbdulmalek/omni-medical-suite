# =============================================================================
# OmniMedical Suite - Continuous Deployment Pipeline
# Triggers on push to main, deploys through staging → canary → full production
# =============================================================================

name: CD Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # never cancel a deploy mid-flight

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/omni-medical-api
  STAGING_NAMESPACE: omni-medical-staging
  PRODUCTION_NAMESPACE: omni-medical-production

jobs:
  # ===========================================================================
  # Job 1: Build Docker image and push to container registry
  # ===========================================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/web/package.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r services/api/requirements.txt

      - name: Install Node dependencies
        run: |
          npm ci --workspace=apps/web

      - name: Run frontend build
        working-directory: apps/web
        run: npm run build

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            BUILD_SHA=${{ github.sha }}

      - name: Run unit tests against built image
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            python -m pytest services/api/tests/ -v --tb=short -q

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 30

  # ===========================================================================
  # Job 2: Deploy to staging and run smoke tests
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.omni-medical.app
    outputs:
      staging-healthy: ${{ steps.smoke-test.outputs.healthy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pytest pytest-asyncio requests

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to staging namespace
        run: |
          kubectl set image deployment/omni-api \
            omni-api=${{ needs.build-and-push.outputs.image-tag }} \
            -n ${{ env.STAGING_NAMESPACE }}

          kubectl rollout status deployment/omni-api \
            -n ${{ env.STAGING_NAMESPACE }} \
            --timeout=300s

      - name: Verify staging rollout
        run: |
          AVAILABLE=$(kubectl get deployment omni-api \
            -n ${{ env.STAGING_NAMESPACE }} \
            -o jsonpath='{.status.availableReplicas}')
          echo "Available replicas: $AVAILABLE"
          if [ "$AVAILABLE" -lt 1 ]; then
            echo "ERROR: No replicas available after rollout"
            kubectl logs deployment/omni-api -n ${{ env.STAGING_NAMESPACE }} --tail=50
            exit 1
          fi

      - name: Run smoke tests
        id: smoke-test
        env:
          STAGING_URL: https://staging.omni-medical.app
          API_KEY: ${{ secrets.STAGING_API_KEY }}
        run: |
          python -c "
          import httpx, sys, time

          base = '${{ env.STAGING_URL }}'
          headers = {'Authorization': 'Bearer ${{ env.API_KEY }}'}
          results = []

          # Wait for service to be reachable
          for attempt in range(30):
              try:
                  r = httpx.get(f'{base}/health', timeout=5)
                  if r.status_code == 200:
                      print(f'Health check passed (attempt {attempt + 1})')
                      break
              except Exception:
                  pass
              time.sleep(2)
          else:
              print('FAIL: Health endpoint unreachable after 60s')
              sys.exit(1)

          # Test key endpoints
          endpoints = [
              ('GET',  '/api/v1/health',        200),
              ('GET',  '/api/v1/documents',      200),
              ('POST', '/api/v1/word-correction', 200),
          ]

          client = httpx.Client(base_url=base, headers=headers, timeout=15)
          for method, path, expected in endpoints:
              r = client.request(method, path)
              status = 'PASS' if r.status_code == expected else 'FAIL'
              results.append(f'{status}: {method} {path} -> {r.status_code}')
              print(results[-1])

          failed = sum(1 for r in results if r.startswith('FAIL'))
          if failed:
              print(f'FAILED: {failed}/{len(results)} smoke tests')
              sys.exit(1)

          print(f'ALL PASSED: {len(results)}/{len(results)} smoke tests')
          "

      - name: Run integration smoke test
        env:
          STAGING_URL: https://staging.omni-medical.app
        run: |
          python -m pytest tests/test_integration.py \
            --tb=short -v \
            --base-url=${{ env.STAGING_URL }} \
            -k "smoke" \
            --timeout=60 || echo "Integration smoke tests skipped (no matching markers)"

      - name: Capture staging deployment info
        if: always()
        run: |
          echo "### Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ needs.build-and-push.outputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ needs.build-and-push.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ env.STAGING_NAMESPACE }}\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 3: Canary deployment to production (25% → monitor → 100%)
  # ===========================================================================
  deploy-production:
    name: Canary Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: needs.deploy-staging.outputs.staging-healthy == 'true'
    environment:
      name: production
      url: https://omni-medical.app
    outputs:
      canary-success: ${{ steps.canary-promote.outputs.success }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx prometheus-client requests

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Set up kubeconfig for production
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

      # ---- Phase 1: Canary at 25% ----
      - name: Scale canary to 25% traffic
        id: canary-start
        run: |
          # Create or update canary deployment with new image
          kubectl set image deployment/omni-api-canary \
            omni-api=${{ needs.build-and-push.outputs.image-tag }} \
            -n ${{ env.PRODUCTION_NAMESPACE }} \
            2>/dev/null || \
          kubectl create deployment omni-api-canary \
            --image=${{ needs.build-and-push.outputs.image-tag }} \
            -n ${{ env.PRODUCTION_NAMESPACE }}

          # Scale canary to 1 replica (assuming 4 total = 25%)
          kubectl scale deployment/omni-api-canary \
            --replicas=1 \
            -n ${{ env.PRODUCTION_NAMESPACE }}

          echo "Waiting for canary pods to be ready..."
          kubectl rollout status deployment/omni-api-canary \
            -n ${{ env.PRODUCTION_NAMESPACE }} \
            --timeout=180s

          echo "canary_ready=true" >> $GITHUB_OUTPUT

      # ---- Phase 2: Health check on canary ----
      - name: Run canary health checks
        id: canary-health
        if: steps.canary-start.outputs.canary_ready == 'true'
        env:
          PROD_URL: https://omni-medical.app
          API_KEY: ${{ secrets.PRODUCTION_API_KEY }}
        run: |
          python -c "
          import httpx, sys, time

          base = '${{ env.PROD_URL }}'
          headers = {'Authorization': 'Bearer ${{ env.API_KEY }}'}

          # Extended health monitoring (5 minutes with checks every 30s)
          check_count = 10
          failures = 0

          for i in range(check_count):
              try:
                  r = httpx.get(f'{base}/api/v1/health', headers=headers, timeout=10)
                  data = r.json()

                  # Check response time is acceptable
                  latency = float(data.get('latency_ms', 0))
                  error_rate = float(data.get('error_rate', 0))

                  if r.status_code != 200 or latency > 500 or error_rate > 0.05:
                      failures += 1
                      print(f'Check {i+1}/{check_count}: WARN status={r.status_code} latency={latency}ms err_rate={error_rate}')
                  else:
                      print(f'Check {i+1}/{check_count}: OK status={r.status_code} latency={latency}ms err_rate={error_rate}')
              except Exception as e:
                  failures += 1
                  print(f'Check {i+1}/{check_count}: FAIL - {e}')

              if i < check_count - 1:
                  time.sleep(30)

          if failures > 3:
              print(f'ABORT: {failures}/{check_count} checks failed')
              sys.exit(1)

          print(f'Canary healthy: {check_count - failures}/{check_count} checks passed')
          "

      # ---- Phase 3: Promote canary to 100% ----
      - name: Promote canary to full production (100%)
        id: canary-promote
        if: steps.canary-health.outcome == 'success'
        run: |
          # Update main production deployment
          kubectl set image deployment/omni-api \
            omni-api=${{ needs.build-and-push.outputs.image-tag }} \
            -n ${{ env.PRODUCTION_NAMESPACE }}

          kubectl rollout status deployment/omni-api \
            -n ${{ env.PRODUCTION_NAMESPACE }} \
            --timeout=300s

          # Remove canary deployment
          kubectl delete deployment omni-api-canary \
            -n ${{ env.PRODUCTION_NAMESPACE }} \
            --ignore-not-found

          # Verify production is serving new image
          CURRENT_IMAGE=$(kubectl get deployment omni-api \
            -n ${{ env.PRODUCTION_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "Production now running: $CURRENT_IMAGE"

          echo "success=true" >> $GITHUB_OUTPUT

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Canary failed health checks - initiating rollback..."

          # Rollback main deployment to previous revision
          kubectl rollout undo deployment/omni-api \
            -n ${{ env.PRODUCTION_NAMESPACE }}

          # Remove canary
          kubectl delete deployment omni-api-canary \
            -n ${{ env.PRODUCTION_NAMESPACE }} \
            --ignore-not-found

          kubectl rollout status deployment/omni-api \
            -n ${{ env.PRODUCTION_NAMESPACE }} \
            --timeout=300s

          echo "Rollback complete"

      - name: Capture production deployment info
        if: always()
        run: |
          echo "### Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Canary (25%) | ${{ steps.canary-start.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Checks | ${{ steps.canary-health.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Promotion | ${{ steps.canary-promote.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rollback | ${{ steps.canary-promote.outcome == 'skipped' && 'TRIGGERED' || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 4: Post-deployment notification
  # ===========================================================================
  notify:
    name: Post-Deploy Notification
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install httpx
        run: pip install httpx

      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "status=SUCCESS" >> $GITHUB_OUTPUT
            echo "color=#36a64f" >> $GITHUB_OUTPUT
            echo "emoji=:white_check_mark:" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-production.result }}" == "failure" ]; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "color=#e01e5a" >> $GITHUB_OUTPUT
            echo "emoji=:x:" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-staging.result }}" == "failure" ]; then
            echo "status=STAGING_FAILED" >> $GITHUB_OUTPUT
            echo "color=#eab308" >> $GITHUB_OUTPUT
            echo "emoji=:warning:" >> $GITHUB_OUTPUT
          else
            echo "status=SKIPPED" >> $GITHUB_OUTPUT
            echo "color=#6b7280" >> $GITHUB_OUTPUT
            echo "emoji=:grey_question:" >> $GITHUB_OUTPUT
          fi

      - name: Run post-deploy production health check
        id: post-deploy-health
        if: needs.deploy-production.result == 'success'
        env:
          PROD_URL: https://omni-medical.app
          API_KEY: ${{ secrets.PRODUCTION_API_KEY }}
        run: |
          python -c "
          import httpx, json

          base = '${{ env.PROD_URL }}'
          headers = {'Authorization': 'Bearer ${{ env.API_KEY }}'}

          checks = {}
          try:
              r = httpx.get(f'{base}/api/v1/health', headers=headers, timeout=15)
              checks['health'] = {'status': r.status_code, 'data': r.json()}
          except Exception as e:
              checks['health'] = {'status': 'error', 'data': str(e)}

          try:
              r = httpx.get(f'{base}/api/v1/documents', headers=headers, timeout=15)
              checks['documents_endpoint'] = r.status_code
          except Exception as e:
              checks['documents_endpoint'] = str(e)

          # Print results
          for name, result in checks.items():
              print(f'{name}: {result}')

          with open('health_results.json', 'w') as f:
              json.dump(checks, f, indent=2, default=str)
          "

      - name: Notify Slack - Success
        if: steps.status.outputs.status == 'SUCCESS'
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} OmniMedical Suite deployed to production",
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": ":rocket: Production Deployment Successful"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`" },
                        { "type": "mrkdwn", "text": "*Branch:*\n`main`" },
                        { "type": "mrkdwn", "text": "*Image:*\n`${{ needs.build-and-push.outputs.image-tag }}`" },
                        { "type": "mrkdwn", "text": "*Actor:*\n${{ github.actor }}" }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": ":github: View Commit" },
                          "url": "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
                        },
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": ":chart_with_upwards_trend: Monitoring" },
                          "url": "https://grafana.omni-medical.app/d/overview"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack - Failure
        if: steps.status.outputs.status != 'SUCCESS'
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} OmniMedical Suite deployment ${{ steps.status.outputs.status }}",
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": ":rotating_light: Deployment ${{ steps.status.outputs.status }}"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Status:*\n${{ steps.status.outputs.status }}" },
                        { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`" },
                        { "type": "mrkdwn", "text": "*Build:*\n${{ needs.build-and-push.result }}" },
                        { "type": "mrkdwn", "text": "*Staging:*\n${{ needs.deploy-staging.result }}" },
                        { "type": "mrkdwn", "text": "*Production:*\n${{ needs.deploy-production.result }}" }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": ":github: View Run" },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        },
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": ":bug: Investigate" },
                          "url": "https://grafana.omni-medical.app/d/alerts"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify PagerDuty on production failure
        if: needs.deploy-production.result == 'failure'
        uses: harbormaster/pagerduty-action@0.1.0
        with:
          event-action: trigger
          pagerduty-integration-key: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
          pagerduty-routing-key: ${{ secrets.PAGERDUTY_ROUTING_KEY }}
          dedup-key: cd-deploy-failure-${{ github.sha }}
          payload: |
            {
              "summary": "OmniMedical production deployment failed for commit ${{ github.sha }}",
              "severity": "high",
              "source": "github-actions",
              "component": "deployment-pipeline",
              "group": "cd-pipeline",
              "class": "deploy-failure",
              "custom_details": {
                "commit": "${{ github.sha }}",
                "actor": "${{ github.actor }}",
                "run_id": "${{ github.run_id }}",
                "build_result": "${{ needs.build-and-push.result }}",
                "staging_result": "${{ needs.deploy-staging.result }}"
              }
            }
