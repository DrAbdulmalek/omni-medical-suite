apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: omnimedical
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'omnimedical-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['omnimedical']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: api
            action: keep
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: omnimedical
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    metrics:
      enabled: true
      address: 0.0.0.0:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: omnimedical
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
