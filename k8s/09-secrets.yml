apiVersion: v1
kind: Secret
metadata:
  name: omnimedical-secrets
  namespace: omnimedical
type: Opaque
stringData:
  POSTGRES_USER: omnimedical
  POSTGRES_PASSWORD: CHANGE_ME_IN_PRODUCTION
  DATABASE_URL: postgresql://omnimedical:CHANGE_ME_IN_PRODUCTION@postgres:5432/omnimedical
  SECRET_KEY: CHANGE_ME_GENERATE_WITH_openssl_rand_hex_32
  REDIS_PASSWORD: ""
---
# NOTE: In production, use Sealed Secrets or External Secrets Operator
# to manage secrets securely. This file is for reference only.
# kubectl create secret generic omnimedical-secrets \
#   --from-literal=POSTGRES_USER=omnimedical \
#   --from-literal=POSTGRES_PASSWORD=<secure-password> \
#   --from-literal=SECRET_KEY=<generated-key> \
#   -n omnimedical
