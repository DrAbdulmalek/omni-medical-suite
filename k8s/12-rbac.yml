apiVersion: v1
kind: ServiceAccount
metadata:
  name: omnimedical-sa
  namespace: omnimedical
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: omnimedical-role
  namespace: omnimedical
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: omnimedical-rolebinding
  namespace: omnimedical
subjects:
  - kind: ServiceAccount
    name: omnimedical-sa
    namespace: omnimedical
roleRef:
  kind: Role
  name: omnimedical-role
  apiGroup: rbac.authorization.k8s.io
